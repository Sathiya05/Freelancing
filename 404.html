    <script>
        // Theme Toggle Logic
        const htmlElement = document.documentElement;
        const themeBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function applyTheme() {
            let theme = localStorage.getItem('careercraft-dark') === 'true';
            if (theme) {
                htmlElement.classList.add('dark');
                themeIcon.className = 'fas fa-sun text-neon';
            } else {
                htmlElement.classList.remove('dark');
                themeIcon.className = 'fas fa-moon';
            }
        }

        function toggleTheme() {
            const isDark = htmlElement.classList.toggle('dark');
            localStorage.setItem('careercraft-dark', isDark);
            applyTheme();
        }

        themeBtn.addEventListener('click', toggleTheme);

        // RTL Toggle Logic
        const rtlBtn = document.getElementById('rtlToggle');

        function applyRTL() {
            let isRTL = localStorage.getItem('careercraft-rtl') === 'true';
            if (isRTL) {
                htmlElement.setAttribute("dir", "rtl");
            } else {
                htmlElement.setAttribute("dir", "ltr");
            }
        }

        function toggleRTL() {
            const currentDir = htmlElement.getAttribute("dir");
            const newDir = currentDir === "rtl" ? "ltr" : "rtl";
            htmlElement.setAttribute("dir", newDir);
            localStorage.setItem("careercraft-rtl", newDir === "rtl");
        }

        rtlBtn.addEventListener('click', toggleRTL);

        // Initialize Theme & RTL securely on load without forcing overwrites
        applyTheme();
        applyRTL();
    </script>
